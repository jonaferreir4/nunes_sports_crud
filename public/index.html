<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Nunes Sports CRUD</title>
</head>
<body>
  <div class="container">
    <h1 class="display-4">Nunes Sports - CRUD de Produtos</h1>

    <!-- Formulário para GET (Listar Produtos) -->
    <form id="getProductsForm" action="/products" method="GET">
      <input type="hidden" name="action" value="listar">
      <button type="submit" class="btn btn-primary">Listar Produtos</button>
    </form>

    <!-- Formulário para POST (Adicionar Produto) -->
    <form id="addProductForm" action="/products" method="POST">
      <input type="hidden" name="action" value="adicionar">
      <div class="form-group">
        <label for="productName">Nome:</label>
        <input type="text" class="form-control" id="productName" name="productName" required>
      </div>

      <div class="form-group">
        <label for="productCode">Código:</label>
        <input type="text" class="form-control" id="productCode" name="productCode" required>
      </div>

      <div class="form-group">
        <label for="productDescription">Descrição:</label>
        <input type="text" class="form-control" id="productDescription" name="productDescription" required>
      </div>

      <div class="form-group">
        <label for="productPrice">Preço:</label>
        <input type="number" class="form-control" id="productPrice" name="productPrice" step="0.01" required>
      </div>

      <button type="submit" class="btn btn-success">Adicionar Produto</button>
    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <script src="index.js"></script>
</body>
</html>
