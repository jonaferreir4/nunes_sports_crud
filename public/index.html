<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>CRUD de Produtos</title>
</head>
<body>
  <header class="header">
    <h1>CRUD de Produtos</h1>
  </header>
  <div class="container">
    <div class="bloco-1">
      <div class="search-create">

        <div class="pesquisar">
          <label for="search"></label>
          <input type="text" id="search" placeholder="Pesquisar Produto" oninput="searchProduct()">
          <button class="button-search" type="button" onclick="searchProduct()"> Pesquisar</button>
        </div>
        
        <div class="create">
          <button class="button-create" type="button" onclick="openCreatePopup()">Novo Produto</button>
        </div>
      </div>
      
      <table id="product-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Preço</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <!-- Os dados da tabela serão inseridos dinamicamente aqui -->
        </tbody>
      </table>
    </div>

  </div>

  <div id="popup" class="popup">
    <div class="popup-content">
      <span class="close" onclick="closePopup()">&times;</span>
      <form id="create-product-form">
        <h2>Novo Produto</h2>
        <label for="newProductName">Nome:</label>
        <input type="text" id="newProductName" required>
        <label for="newProductDescription">Descrição:</label>
        <textarea name="newProductDescription" id="newProductDescription" cols="30" rows="5"></textarea>
        <label for="newProductPrice">Preço:</label>
        <input type="number" id="newProductPrice" required>
        <button class="button-create" type="button" onclick="createProduct()">Criar Produto</button>
      </form>
    </div>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
